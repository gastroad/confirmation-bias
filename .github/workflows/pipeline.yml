name: Pipeline (collect + ingest)

on:
  # 6시간마다 자동 실행 (UTC). 정각(:00)은 GitHub 부하로 지연·드롭이 잦아 :17로 오프셋.
  # 원래 매시간이었으나 Supabase egress 초과로 완화(2026-07-08). ingest centroid
  # 인메모리 로딩 리팩터로 건당 egress를 크게 줄였으니, 필요하면 주기를 다시 좁혀도 됨.
  # 토큰 사용량 보고 주기 조정 예정 — pipeline-scheduling.md 참조.
  schedule:
    - cron: "17 */6 * * *"
  # 수동 실행 (Actions 탭에서 Run workflow). 2차 UI 트리거 전까지 테스트/온디맨드용.
  workflow_dispatch:

# 직전 실행이 길어져도 겹쳐 돌지 않도록 (이중 적재 방지). 진행 중이면 새 실행을 대기시킨다.
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Collect RSS
        run: npm run collect

      - name: Ingest (embed + cluster + upsert)
        run: npm run ingest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
